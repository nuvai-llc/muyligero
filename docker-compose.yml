services:
  mongo:
    image: mongo:6
    container_name: muyligero-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: muyligero-api
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: mongodb://mongo:27017/lighterpack
      DEPLOY_URL: http://localhost:3000
      PUBLIC_URL: http://localhost:3000
      WEB_URL: http://localhost:8080
      API_BASE_URL: http://localhost:3000
      SHARE_BASE_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: muyligero-web
    depends_on:
      - api
    environment:
      NODE_ENV: development
      DEV_SERVER_PORT: 8080
      WEB_URL: http://localhost:8080
      API_BASE_URL: http://localhost:3000
      SHARE_BASE_URL: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongo-data:
